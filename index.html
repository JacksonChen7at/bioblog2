<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Silent Heroes: Why Plants Matter</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1220;
    color: #e5e7eb;
}

nav {
    background: #111827;
    padding: 15px;
    position: sticky;
    top: 0;
    display: flex;
    justify-content: center;
    gap: 20px;
    border-bottom: 1px solid #1f2937;
    align-items: center;
    position: relative;
}

nav a {
    color: #cfcfcf;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

nav a:hover {
    color: #93c5fd;
    text-shadow: 0 0 10px #2563eb;
}

/* BUTTON */
#authBtn {
    position: absolute;
    right: 15px;
    top: calc(50% - 10px);
    transform: translateY(-50%);
    background: #2563eb;
    color: white;
    border: none;
    padding: 8px 11px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
}

/* MESSAGE */
#message {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: #111827;
    border: 1px solid #2563eb;
    padding: 10px 20px;
    border-radius: 8px;
    display: none;
    z-index: 999;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    justify-content: center;
    align-items: center;
}

.authBox {
    background: #111827;
    padding: 25px;
    border-radius: 12px;
    width: 360px;
}

/* LOGOUT MODAL */
#logoutModal .authBox {
    text-align: center;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 15px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 8px;
}

</style>
</head>

<body>

<nav>
    <a href="#intro">Introduction</a>
    <a href="#importance">Importance</a>
    <a href="#gymno">Gymnosperms</a>
    <a href="#angio">Angiosperms</a>

    <button id="authBtn" onclick="authButtonAction()">Sign In / Sign Up</button>
</nav>

<div id="message"></div>

<header>
    <h1>Silent Heroes: Why Plants Matter</h1>
</header>

<!-- LOGIN MODAL -->
<div id="authModal" class="modal">
    <div class="authBox">
        <h2 id="authTitle">Sign In</h2>

        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">

        <button onclick="authAction()">Continue</button>
        <button onclick="toggleMode()" id="switchBtn">Create an account</button>
        <button onclick="closeAuth()">Close</button>
    </div>
</div>

<!-- NEW LOGOUT MODAL -->
<div id="logoutModal" class="modal">
    <div class="authBox">
        <h2>Logout</h2>
        <p id="logoutText"></p>

        <button onclick="confirmLogout()">Yes, Logout</button>
        <button onclick="closeLogout()">No</button>
    </div>
</div>

<script>

function showMessage(text) {
    let m = document.getElementById("message");
    m.innerText = text;
    m.style.display = "block";
    setTimeout(() => m.style.display = "none", 2500);
}

/* AUTH */
let mode = "signin";

function authButtonAction() {
    let user = localStorage.getItem("loggedInUser");

    if (user) {
        openLogout(user);
    } else {
        document.getElementById("authModal").style.display = "flex";
    }
}

function closeAuth() {
    document.getElementById("authModal").style.display = "none";
}

function toggleMode() {
    mode = mode === "signin" ? "signup" : "signin";

    document.getElementById("authTitle").innerText =
        mode === "signin" ? "Sign In" : "Sign Up";

    document.getElementById("switchBtn").innerText =
        mode === "signin"
        ? "Create an account"
        : "Already have an account? Sign in";
}

function authAction() {
    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if (!u || !p) return;

    if (mode === "signup") {
        localStorage.setItem("user_" + u, p);
        showMessage("Account created");
    } else {
        let saved = localStorage.getItem("user_" + u);

        if (saved === p) {
            localStorage.setItem("loggedInUser", u);
            closeAuth();
            updateBtn();
            showMessage("Logged in successfully");
        } else {
            showMessage("Wrong username or password");
        }
    }
}

function updateBtn() {
    let user = localStorage.getItem("loggedInUser");
    document.getElementById("authBtn").innerText =
        user ? "Logout (" + user + ")" : "Sign In / Sign Up";
}

/* LOGOUT (NEW SYSTEM) */
function openLogout(user) {
    document.getElementById("logoutText").innerText =
        "Do you want to logout of " + user + "?";

    document.getElementById("logoutModal").style.display = "flex";
}

function closeLogout() {
    document.getElementById("logoutModal").style.display = "none";
}

function confirmLogout() {
    localStorage.removeItem("loggedInUser");
    updateBtn();
    closeLogout();
    showMessage("You are logged out");
}

updateBtn();

</script>

</body>
</html>
